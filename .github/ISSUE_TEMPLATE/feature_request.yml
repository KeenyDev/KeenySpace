name: Feature Request
description: Propose a new feature or improvement for KeenySpace
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement. Please describe what you need and why.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem are you trying to solve, or what is missing today?
      placeholder: Describe the problem or gap.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider? Why did you prefer the proposed solution?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or references that may be useful.
