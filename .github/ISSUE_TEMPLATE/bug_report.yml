name: Bug Report
description: Report a bug in KeenySpace
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in the sections below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the unexpected behavior.
      placeholder: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Start the stack with `docker compose up`
        2. Run `keenyspace ...`
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: ks-version
    attributes:
      label: KeenySpace version
      description: Output of `keenyspace --version` or the Docker image tag.
      placeholder: "v0.1.0-alpha.1"
    validations:
      required: true

  - type: input
    id: docker-version
    attributes:
      label: Docker version
      description: Output of `docker version --format '{{.Server.Version}}'`
      placeholder: "27.x.x"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.x / Ubuntu 24.04"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant server logs (from `docker compose logs keenyspace`) or client output.
      render: shell
