name: Release Drill

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  backup-restore-drill:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install keenyspace CLI
        run: uv sync --all-packages --all-extras
      - name: Build image
        run: docker build -f deploy/Dockerfile -t keenyspace:drill .
      - name: Set image in compose
        run: |
          export COMPOSE_FILE=deploy/docker-compose.yml
          docker compose -f deploy/docker-compose.yml config -q
      - name: Seed and backup-restore drill
        env:
          COMPOSE_PROJECT_NAME: ks-drill
          KEENYSPACE_ADMIN_API_ENABLED: "1"
        run: bash deploy/scripts/backup-restore-drill.sh

  proxy-test-caddy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f deploy/Dockerfile -t keenyspace:drill .
      - name: Start stack with Caddy
        env:
          COMPOSE_PROJECT_NAME: ks-caddy
          KEENYSPACE_ADMIN_API_ENABLED: "1"
        run: |
          docker compose -f deploy/docker-compose.yml up -d
          until curl -sf http://localhost:8000/healthz; do sleep 2; done
      - name: SSE proxy test via Caddy
        env:
          KS_API_KEY: ${{ secrets.KS_DRILL_API_KEY }}
          COMPOSE_PROJECT_NAME: ks-caddy
        run: bash deploy/scripts/sse-proxy-test.sh caddy
      - name: Teardown
        if: always()
        env:
          COMPOSE_PROJECT_NAME: ks-caddy
        run: docker compose -f deploy/docker-compose.yml down -v

  proxy-test-nginx:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f deploy/Dockerfile -t keenyspace:drill .
      - name: Start stack with nginx
        env:
          COMPOSE_PROJECT_NAME: ks-nginx
          KEENYSPACE_ADMIN_API_ENABLED: "1"
        run: |
          docker compose -f deploy/docker-compose.yml up -d keenyspace postgres authentik authentik-worker authentik-postgresql authentik-redis
          until curl -sf http://localhost:8000/healthz; do sleep 2; done
          docker run -d --name ks-nginx-proxy \
            --network ks-nginx_default \
            -p 80:80 \
            -v "$PWD/deploy/reverse-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:stable-alpine
      - name: SSE proxy test via nginx
        env:
          KS_API_KEY: ${{ secrets.KS_DRILL_API_KEY }}
          COMPOSE_PROJECT_NAME: ks-nginx
        run: bash deploy/scripts/sse-proxy-test.sh nginx
      - name: Teardown
        if: always()
        env:
          COMPOSE_PROJECT_NAME: ks-nginx
        run: |
          docker rm -f ks-nginx-proxy || true
          docker compose -f deploy/docker-compose.yml down -v
