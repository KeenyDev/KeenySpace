name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  packages: write
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/uber910/keenyspace:${{ github.sha }}-${{ matrix.suffix }}

  merge:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/uber910/keenyspace
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,prefix=sha-,format=short
      - name: Create multi-arch manifest
        run: |
          TAG_ARGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS="$TAG_ARGS -t $tag"
          done <<< "${{ steps.meta.outputs.tags }}"
          docker buildx imagetools create $TAG_ARGS \
            ghcr.io/uber910/keenyspace:${{ github.sha }}-amd64 \
            ghcr.io/uber910/keenyspace:${{ github.sha }}-arm64

  release:
    needs: merge
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/uber910/keenyspace
          tags: |
            type=semver,pattern={{version}}
      - uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          body_path: docs/release-notes/v0.1.0-alpha.1.md
